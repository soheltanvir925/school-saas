{% extends "base.html" %}
{% block title %}Password Changed - {{ request.user.school.name|default:"School" }}{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-lg p-5">
                <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                <h3 class="fw-bold mt-3">Password Changed!</h3>
                <p class="text-muted">Your password has been updated successfully.</p>
                <a href="{% url 'core:dashboard' %}" class="btn btn-primary mt-3">Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
